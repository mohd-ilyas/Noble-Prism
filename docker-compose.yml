version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: noble_prism_db
    environment:
      POSTGRES_USER: nobleprism
      POSTGRES_PASSWORD: nobleprism_secret
      POSTGRES_DB: nobleprism
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nobleprism -d nobleprism"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noble_prism_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://nobleprism:nobleprism_secret@postgres:5432/nobleprism
      ENVIRONMENT: production
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:4173"
      VELOCITY_WINDOW_SECONDS: "120"
      VELOCITY_MAX_TRANSACTIONS: "20"
      KILL_SWITCH_RISK_THRESHOLD: "0.85"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
