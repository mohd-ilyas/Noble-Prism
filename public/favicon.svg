<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer green circle ring -->
  <circle cx="50" cy="50" r="45" stroke="#2ec4a0" stroke-width="5" fill="none"/>

  <!-- ── Network lines ── -->
  <!-- top-center node to bottom-left node -->
  <line x1="50" y1="22" x2="28" y2="68" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <!-- top-center node to bottom-right node -->
  <line x1="50" y1="22" x2="72" y2="68" stroke="#2ec4a0" stroke-width="4" stroke-linecap="round"/>
  <!-- middle-left node to bottom-left node -->
  <line x1="34" y1="44" x2="28" y2="68" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <!-- middle-right node to bottom-right node -->
  <line x1="66" y1="44" x2="72" y2="68" stroke="#2ec4a0" stroke-width="4" stroke-linecap="round"/>
  <!-- middle-left to middle-right (cross bar) -->
  <line x1="34" y1="44" x2="66" y2="44" stroke="#1e40af" stroke-width="4" stroke-linecap="round"/>
  <!-- top to middle-left -->
  <line x1="50" y1="22" x2="34" y2="44" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <!-- top to middle-right -->
  <line x1="50" y1="22" x2="66" y2="44" stroke="#2ec4a0" stroke-width="4" stroke-linecap="round"/>

  <!-- ── Junction dots ── -->
  <circle cx="34" cy="44" r="5" fill="#2563eb"/>
  <circle cx="66" cy="44" r="5" fill="#2ec4a0"/>

  <!-- ── Top cube (blue) ── -->
  <g transform="translate(50,22)">
    <!-- outer hex outline -->
    <polygon points="0,-10 8.66,-5 8.66,5 0,10 -8.66,5 -8.66,-5"
             stroke="#2563eb" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <!-- inner hex -->
    <polygon points="0,-5 4.33,-2.5 4.33,2.5 0,5 -4.33,2.5 -4.33,-2.5"
             stroke="#2563eb" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <!-- center dot -->
    <circle cx="0" cy="0" r="2" fill="#2563eb"/>
    <!-- spokes -->
    <line x1="0" y1="-5" x2="0" y2="-10" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="4.33" y1="-2.5" x2="8.66" y2="-5" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="4.33" y1="2.5" x2="8.66" y2="5" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="0" y1="5" x2="0" y2="10" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="-4.33" y1="2.5" x2="-8.66" y2="5" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="-4.33" y1="-2.5" x2="-8.66" y2="-5" stroke="#2563eb" stroke-width="1.5"/>
  </g>

  <!-- ── Bottom-left cube (blue) ── -->
  <g transform="translate(28,68)">
    <polygon points="0,-9 7.79,-4.5 7.79,4.5 0,9 -7.79,4.5 -7.79,-4.5"
             stroke="#2563eb" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <polygon points="0,-4.5 3.9,-2.25 3.9,2.25 0,4.5 -3.9,2.25 -3.9,-2.25"
             stroke="#2563eb" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="1.8" fill="#2563eb"/>
    <line x1="0" y1="-4.5" x2="0" y2="-9" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="3.9" y1="-2.25" x2="7.79" y2="-4.5" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="3.9" y1="2.25" x2="7.79" y2="4.5" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="0" y1="4.5" x2="0" y2="9" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="-3.9" y1="2.25" x2="-7.79" y2="4.5" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="-3.9" y1="-2.25" x2="-7.79" y2="-4.5" stroke="#2563eb" stroke-width="1.5"/>
  </g>

  <!-- ── Bottom-right cube (green) ── -->
  <g transform="translate(72,68)">
    <polygon points="0,-9 7.79,-4.5 7.79,4.5 0,9 -7.79,4.5 -7.79,-4.5"
             stroke="#2ec4a0" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <polygon points="0,-4.5 3.9,-2.25 3.9,2.25 0,4.5 -3.9,2.25 -3.9,-2.25"
             stroke="#2ec4a0" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="1.8" fill="#2ec4a0"/>
    <line x1="0" y1="-4.5" x2="0" y2="-9" stroke="#2ec4a0" stroke-width="1.5"/>
    <line x1="3.9" y1="-2.25" x2="7.79" y2="-4.5" stroke="#2ec4a0" stroke-width="1.5"/>
    <line x1="3.9" y1="2.25" x2="7.79" y2="4.5" stroke="#2ec4a0" stroke-width="1.5"/>
    <line x1="0" y1="4.5" x2="0" y2="9" stroke="#2ec4a0" stroke-width="1.5"/>
    <line x1="-3.9" y1="2.25" x2="-7.79" y2="4.5" stroke="#2ec4a0" stroke-width="1.5"/>
    <line x1="-3.9" y1="-2.25" x2="-7.79" y2="-4.5" stroke="#2ec4a0" stroke-width="1.5"/>
  </g>
</svg>
